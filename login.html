<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orações Diárias — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0a12;
    --bg-panel:#14141f;
    --bg-field:#1b1b28;
    --gold-1:#e8c468;
    --gold-2:#b9873a;
    --parchment:#ede6d6;
    --muted:#8b87a0;
    --line:#2a2a3a;
    --glow: rgba(232,196,104,0.35);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background: var(--bg-deep);
    font-family:'Inter', sans-serif;
    color:var(--parchment);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .screen{
    width:100%;
    max-width:420px;
    background:var(--bg-panel);
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03);
    position:relative;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    height:280px;
    background-image:
      linear-gradient(180deg, rgba(10,10,18,0) 0%, rgba(10,10,18,0) 48%, rgba(10,10,18,0.78) 82%, var(--bg-panel) 100%),
      url('assets/img/oracoes/oracao_pela_paz_capa.jpeg');
    background-size:cover;
    background-position:center 20%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    padding:0 32px 22px;
    text-align:center;
  }

  /* halo glow — signature element, sits behind the cross mark */
  .halo{
    position:absolute;
    top:26px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
    height:120px;
    border-radius:50%;
    background:radial-gradient(circle, var(--glow) 0%, rgba(232,196,104,0) 70%);
    animation:breathe 5s ease-in-out infinite;
  }
  @media (prefers-reduced-motion: reduce){ .halo{ animation:none; } }
  @keyframes breathe{
    0%,100%{ opacity:0.55; transform:translateX(-50%) scale(1); }
    50%{ opacity:0.9; transform:translateX(-50%) scale(1.12); }
  }

  .cross-mark{
    position:relative;
    z-index:2;
    width:34px;
    height:34px;
    margin-top:18px;
    color:var(--gold-1);
  }

  .verse{
    position:relative;
    z-index:2;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:17px;
    line-height:1.4;
    color:var(--parchment);
    text-shadow:0 2px 12px rgba(0,0,0,0.6);
    margin:14px 0 4px;
  }
  .verse-ref{
    position:relative;
    z-index:2;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--gold-1);
    font-weight:600;
  }

  /* ---------- BODY ---------- */
  .body{
    padding:30px 30px 34px;
  }

  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-bottom:4px;
  }
  .brand svg{ width:16px; height:16px; color:var(--gold-1); }
  .brand span{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    letter-spacing:0.06em;
    font-size:15px;
    color:var(--gold-1);
    text-transform:uppercase;
  }

  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:28px;
    text-align:center;
    margin:6px 0 6px;
    color:var(--parchment);
  }
  .sub{
    text-align:center;
    font-size:13.5px;
    color:var(--muted);
    margin:0 0 26px;
  }

  form{ display:flex; flex-direction:column; gap:16px; }

  label{
    font-size:12px;
    font-weight:500;
    color:var(--muted);
    letter-spacing:0.03em;
    margin-bottom:7px;
    display:block;
  }

  .field{
    position:relative;
  }
  .field svg{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    width:17px;
    height:17px;
    color:var(--muted);
    transition:color 0.2s ease;
    pointer-events:none;
  }
  .field input{
    width:100%;
    background:var(--bg-field);
    border:1px solid var(--line);
    border-radius:13px;
    padding:14px 16px 14px 44px;
    font-size:14.5px;
    color:var(--parchment);
    font-family:'Inter', sans-serif;
    outline:none;
    transition:border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .field input::placeholder{ color:#5c5972; }
  .field input:focus{
    border-color:var(--gold-2);
    box-shadow:0 0 0 3px rgba(232,196,104,0.14);
  }
  .field input:focus + svg,
  .field:has(input:focus) svg{ color:var(--gold-1); }

  .forgot{
    text-align:right;
    margin-top:-4px;
  }
  .forgot a{
    font-size:12.5px;
    color:var(--muted);
    text-decoration:none;
  }
  .forgot a:hover{ color:var(--gold-1); }

  .btn-primary{
    margin-top:6px;
    width:100%;
    border:none;
    border-radius:14px;
    padding:15px 20px;
    background:linear-gradient(135deg, var(--gold-1), var(--gold-2));
    color:#241a06;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(185,135,58,0.28);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:hover{ transform:translateY(-1px); box-shadow:0 14px 30px rgba(185,135,58,0.36); }
  .btn-primary:focus-visible{ outline:2px solid var(--gold-1); outline-offset:3px; }
  .btn-primary svg{ width:16px; height:16px; }

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:26px 0 20px;
    color:var(--muted);
    font-size:12px;
  }
  .divider::before, .divider::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }

  .signup{
    text-align:center;
    font-size:13.5px;
    color:var(--muted);
  }
  .signup a{
    color:var(--gold-1);
    font-weight:600;
    text-decoration:none;
  }
  .signup a:hover{ text-decoration:underline; }

</style>
</head>
<body>

<div class="screen">

  <div class="hero">
    <div class="halo"></div>
    <svg class="cross-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
      <line x1="12" y1="2.5" x2="12" y2="21.5"/>
      <line x1="5.5" y1="8.5" x2="18.5" y2="8.5"/>
    </svg>
    <p class="verse">&ldquo;Vinde a mim, todos os que estais cansados&rdquo;</p>
    <span class="verse-ref">Mateus 11:28</span>
  </div>

  <div class="body">

    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <line x1="12" y1="3" x2="12" y2="21"/>
        <line x1="6" y1="8" x2="18" y2="8"/>
      </svg>
      <span>Orações Diárias</span>
    </div>

    <h1>Bem-vindo de volta</h1>
    <p class="sub">Entre para continuar sua jornada de oração</p>

    <form>
      <div>
        <label for="email">E-mail</label>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="3" y="5" width="18" height="14" rx="2.5"/>
            <path d="M3.5 6.5 12 13 20.5 6.5"/>
          </svg>
          <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
        </div>
      </div>

      <div>
        <label for="senha">Senha</label>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="4.5" y="10.5" width="15" height="10" rx="2.3"/>
            <path d="M8 10.5V7.8a4 4 0 0 1 8 0v2.7"/>
          </svg>
          <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <div class="forgot"><a href="#">Esqueci minha senha</a></div>

      <button type="submit" class="btn-primary">
        Entrar
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="13 6 19 12 13 18"/>
        </svg>
      </button>
    </form>

    <div class="divider">ou</div>

    <p class="signup">Novo por aqui? <a href="#">Criar conta</a></p>

  </div>
</div>

</body>
</html>
